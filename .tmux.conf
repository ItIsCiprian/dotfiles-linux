# ~/.config/tmux/tmux.conf

# ─── 1. Terminal & Core ───────────────────────────────────────────────────────
set -g default-shell      /bin/zsh
set -g default-terminal   "tmux-256color"
set -as terminal-overrides ',*:Tc,xterm-256color:RGB,screen-256color:RGB,tmux-256color:RGB,ghostty:RGB'

set -g  history-limit    100000
set -sg escape-time      10       # removes ESC delay (essential for Neovim)
set -g  focus-events     on       # pass focus events through to apps
set -g  aggressive-resize on
set -g  set-clipboard    on

# ─── 2. Window & Pane Numbering ───────────────────────────────────────────────
set -g  base-index       1
setw -g pane-base-index  1
set -g  renumber-windows on       # close a window → gaps close automatically

# ─── 3. Status Bar ────────────────────────────────────────────────────────────
set -g status-position   top
set -g status-interval   5
set -g display-time      2000

set -g bell-action       none
set -g visual-activity   on

# ─── 4. Mouse ─────────────────────────────────────────────────────────────────
set -g mouse on

# ─── 5. Prefix ────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind  C-a send-prefix     # C-a C-a → send literal C-a to the inner shell

# ─── 6. Key Bindings ──────────────────────────────────────────────────────────

# Reload config
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "✔ tmux.conf reloaded"

# Pane navigation (vim-style; vim-tmux-navigator extends these automatically)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane splitting — inherit current path
unbind %
unbind '"'
bind | split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'

# Pane resizing (-r = repeatable without re-pressing prefix)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Pane zoom / swap / sync
bind m   resize-pane -Z
bind '{' swap-pane -U
bind '}' swap-pane -D
bind C-y set -w synchronize-panes \; display-message "sync-panes: #{?pane_synchronized,on,off}"

# New window — inherit current path
bind c new-window -c '#{pane_current_path}'

# ─── 7. Vi Copy Mode ──────────────────────────────────────────────────────────
setw -g mode-keys vi

# Wayland-first clipboard helper (falls back to X11 → macOS → /dev/null)
set -g @_copy_cmd \
  'if command -v wl-copy >/dev/null 2>&1; then wl-copy; \
   elif command -v xclip >/dev/null 2>&1; then xclip -in -selection clipboard; \
   elif command -v pbcopy >/dev/null 2>&1; then pbcopy; \
   else cat >/dev/null; fi'

bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi V   send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y   send -X copy-selection
bind -T copy-mode-vi Y   send -X copy-pipe-and-cancel "#{@_copy_cmd}"

# Suppress the default drag-to-copy so y/Y are the only copy triggers
unbind -T copy-mode-vi MouseDragEnd1Pane

# Copy tmux buffer → system clipboard from normal mode
unbind Y
bind Y run "tmux save-buffer - | sh -c '#{@_copy_cmd}'" \; display-message '📋 copied'

# ─── 8. Plugins ───────────────────────────────────────────────────────────────
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'

# ─── 9. Plugin Configuration ──────────────────────────────────────────────────

# catppuccin
set -g @catppuccin_flavor               "macchiato"
set -g @catppuccin_window_status_style  "rounded"

# resurrect / continuum
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore               'on'

# ─── 10. Status Bar Widgets (catppuccin) ──────────────────────────────────────
# Must come after catppuccin.tmux is sourced so its format strings are defined.
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

set -g status-left-length  100
set -g status-right-length 100
set -g status-left         ""
set -g status-right        "#{E:@catppuccin_status_application}"
set -agF status-right      "#{E:@catppuccin_status_cpu}"
set -ag  status-right      "#{E:@catppuccin_status_session}"
set -ag  status-right      "#{E:@catppuccin_status_uptime}"
set -agF status-right      "#{E:@catppuccin_status_battery}"

# ─── 11. Bootstrap TPM (auto-install if missing) ──────────────────────────────
if-shell '[ ! -d ~/.config/tmux/plugins/tpm ]' \
  'run-shell "git clone --depth=1 https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && \
              ~/.config/tmux/plugins/tpm/bin/install_plugins"'

# Initialize TPM — must be the last line
run '~/.config/tmux/plugins/tpm/tpm'
